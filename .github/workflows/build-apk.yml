name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 安装依赖
        run: npm ci

      - name: 🏗️ 构建 Web 应用
        run: npm run build

      - name: ☕ 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🤖 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: 📱 初始化 Capacitor Android 项目
        run: npx cap add android

      - name: 🔄 同步 Web 资源到 Android
        run: npx cap sync android

      - name: 🔧 生成密钥库（用于签名）
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias calligraphy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Calligraphy Review, OU=Dev, O=Calligraphy, L=Beijing, ST=Beijing, C=CN" \
            -noprompt

      - name: 🔨 构建 Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: calligraphy-review-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
